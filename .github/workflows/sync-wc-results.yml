name: Sync WC Results

on:
  schedule:
    # Every hour at :05 past the hour
    - cron: "5 * * * *"
  workflow_dispatch: # allow manual runs from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke sync-wc-results edge function
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "https://dezpxytpaqffzergfbpg.supabase.co/functions/v1/sync-wc-results")

          echo "HTTP status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          # Fail the job if the function returned an error status
          if [ "$RESPONSE" -ge 400 ]; then
            echo "Edge function returned error status $RESPONSE"
            exit 1
          fi
